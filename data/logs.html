<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LED Matrix System Logs</title>
    <!-- Force cache refresh -->
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <!-- External CSS -->
    <link rel="stylesheet" href="/css/styles.css">
  </head>
  <body>
    <nav>
      <a href="/">Home</a>
      <a href="/status">Status</a>
      <a href="/update">Update Firmware</a>
      <a href="/updatefs">Update SPIFFS</a>
      <a href="/reboot">Reboot</a>
      <a href="/control">Control Panel</a>
      <a href="/logs" class="active">System Logs</a>
    </nav>
    
    <div class="container">
      <div class="card">
        <h1>System Logs</h1>
        <p>Logs from the LED Matrix Controller (refreshes every 5s)</p>
        
        <div class="card">
          <div class="dropdown-container">
            <label for="apiToken">API Token:</label>
            <input type="password" id="apiToken" placeholder="Enter token">
            <label for="logLevel">Log Level:</label>
            <select id="logLevel">
              <option value="verbose">Verbose</option>
              <option value="debug">Debug</option>
              <option value="info" selected>Info</option>
              <option value="warning">Warning</option>
              <option value="error">Error</option>
            </select>
            <button id="btnApplyLogLevel">Apply</button>
            <button id="btnClearLogs">Clear Logs</button>
          </div>
          
          <div id="logs" class="log-container"></div>
        </div>
      </div>
    </div>
    
    <script>
      document.addEventListener('DOMContentLoaded', function() {
        const logsEl = document.getElementById('logs');
        const btnClearLogs = document.getElementById('btnClearLogs');
        const btnApplyLogLevel = document.getElementById('btnApplyLogLevel');
        const logLevel = document.getElementById('logLevel');
        const tokenInput = document.getElementById('apiToken');
        let pollInterval = null;

        tokenInput.value = localStorage.getItem('apiToken') || '';

        function fetchLogs() {
          const level = logLevel.value;
          fetch('/api/getLogs?level=' + encodeURIComponent(level))
            .then(function(response) { return response.text(); })
            .then(function(text) {
              // Use textContent to prevent XSS
              logsEl.textContent = text || '(no logs)';
              logsEl.scrollTop = logsEl.scrollHeight;
            })
            .catch(function(err) {
              console.error('Error fetching logs:', err);
            });
        }

        function startPolling() {
          if (pollInterval) clearInterval(pollInterval);
          fetchLogs();
          pollInterval = setInterval(fetchLogs, 5000);
        }

        btnClearLogs.addEventListener('click', function() {
          const token = tokenInput.value.trim();
          localStorage.setItem('apiToken', token);
          fetch('/api/clearLogs', {
            method: 'POST',
            headers: token ? { 'X-API-Key': token } : {}
          })
            .then(function() { fetchLogs(); })
            .catch(function(err) {
              console.error('Error clearing logs:', err);
            });
        });

        btnApplyLogLevel.addEventListener('click', function() {
          fetchLogs();
        });

        startPolling();
      });
    </script>
  </body>
</html>
